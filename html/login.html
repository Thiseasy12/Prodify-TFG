<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesion | Prodify</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>

<body class="login-body">

    <main class="login-container">
        <h1 class="login-title">Prodify</h1>
        <p class="login-subtitle">Organiza proyectos, equipos y resultados en un solo lugar.</p>
        <div class="login-box">
            <h2>Inicia sesion para entrar a tus tableros</h2>
            {% if error %}
            <div class="login-error">{{ error }}</div>
            {% endif %}
            <form action="/login" method="POST">
                <input type="email" name="email" class="form-control" placeholder="Correo electronico" required>
                <input type="password" name="password" class="form-control" placeholder="Contrasena" required>
                <button type="submit" class="btn btn-login w-100">Entrar</button>
            </form>
            <hr>
            <div class="login-footer">
                <a href="#">No puedes iniciar sesion</a> - <a href="#">Registrarse</a>
            </div>
        </div>
        <p class="login-hint">Acceso rapido: <strong>test@prodify.com</strong> / <strong>1234</strong></p>
    </main>

</body>

</html>
