<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prodify | Tableros</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>

<body class="boards-page">
    <!-- Barra superior principal con marca, buscador y menu de usuario. -->
    <header class="topbar navbar navbar-expand-lg">
        <div class="container-fluid px-3 px-lg-4">
            <div class="topbar-left d-flex align-items-center">
                <div class="brand-pill">
                    <span class="brand-icon">P</span>
                    <span class="brand-text">Prodify</span>
                </div>
            </div>

            <div class="topbar-center d-flex align-items-center">
                <input class="search-input form-control" type="text" placeholder="Buscar tableros, tareas o miembros">
                <button class="create-btn js-create-workspace btn" type="button">Crear</button>
            </div>

            <div class="topbar-right">
                <button class="theme-toggle btn" id="themeToggle" type="button" aria-label="Cambiar tema">Modo claro</button>
                <button class="user-badge" id="accountToggle" type="button">{{ user_initial }}</button>
                {{ account_menu_html }}
            </div>
        </div>
    </header>

    <!-- Layout general con sidebar a la izquierda y contenido a la derecha. -->
    <main class="layout container-fluid p-0">
        <div class="row g-0 min-vh-100">
            <aside class="sidebar col-12 col-lg-3 col-xl-2">
                <!-- Navegacion principal entre las pantallas mas importantes. -->
                {{ side_nav_html }}

                <div class="workspace-title">Espacios de trabajo</div>

                <!-- Aqui recorro los espacios creados por el usuario. -->
                {{ workspace_list_html }}
            </aside>

            <section class="content col-12 col-lg-9 col-xl-10">
                <!-- Bloque de tableros vistos hace poco. -->
                <h2 class="section-title">Visto recientemente</h2>
                <div class="boards-row row g-3 mb-4">{{ recent_boards_html }}</div>

                <h2 class="section-title section-spaced">Tus espacios de trabajo</h2>

                <!-- En este bloque enseño cada espacio con sus tableros. -->
                {{ workspace_blocks_html }}
            </section>
        </div>
    </main>

    <!-- Formularios ocultos que luego relleno desde JavaScript. -->
    <form id="workspaceCreateForm" action="{{ url_for('create_workspace') }}" method="POST" hidden>
        <input type="text" name="workspace_name" id="workspaceNameInput">
    </form>

    <form id="boardCreateForm" action="" method="POST" hidden>
        <input type="text" name="board_name" id="boardNameInput">
    </form>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('js_static', filename='script.js') }}"></script>
</body>

</html>
