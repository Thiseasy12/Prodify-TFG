<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prodify | {{ board.name }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>

<body class="boards-page board-page">
    <!-- Header del tablero con buscador y boton para volver. -->
    <header class="topbar navbar navbar-expand-lg">
        <div class="container-fluid px-3 px-lg-4">
            <div class="topbar-left d-flex align-items-center">
                <div class="brand-pill">
                    <span class="brand-icon">P</span>
                    <span class="brand-text">Prodify</span>
                </div>
            </div>

            <div class="topbar-center d-flex align-items-center">
                <input class="search-input form-control" type="text" placeholder="Buscar en {{ board.name }}">
                <a class="create-btn btn" href="{{ url_for('home') }}">Volver</a>
            </div>

            <div class="topbar-right">
                <button class="theme-toggle btn" id="themeToggle" type="button" aria-label="Cambiar tema">Modo claro</button>
            </div>
        </div>
    </header>

    <!-- Layout del tablero con sidebar y zona kanban. -->
    <main class="layout container-fluid p-0">
        <div class="row g-0 min-vh-100">
            <aside class="sidebar col-12 col-lg-3 col-xl-2">
                <!-- Navegacion lateral para moverme entre vistas. -->
                {{ side_nav_html }}
                <div class="workspace-title">Tablero actual</div>
                <a class="workspace-item" href="{{ url_for('home') }}">
                    <span class="workspace-avatar">{{ board.name[0]|upper }}</span>
                    <span>Tablero principal</span>
                </a>
            </aside>

            <section class="content col-12 col-lg-9 col-xl-10">
                <!-- Cabecera del tablero con el nombre y accion principal. -->
                <div class="board-header">
                    <div>
                        <span class="eyebrow">Tablero</span>
                        <h1>{{ board.name }}</h1>
                    </div>
                    <button class="btn-primary js-add-column" type="button">Nueva columna</button>
                </div>

                <div class="kanban">{{ board_columns_html }}</div>
            </section>
        </div>
    </main>

    <!-- Formularios ocultos para crear columnas y tarjetas desde JS. -->
    <form id="columnCreateForm" action="{{ url_for('create_column', board_id=board.id) }}" method="POST" hidden>
        <input type="text" name="column_title" id="columnTitleInput">
    </form>

    <form id="cardCreateForm" action="" method="POST" hidden>
        <input type="text" name="card_title" id="cardTitleInput">
    </form>

    <!-- Dejo el id del tablero disponible para el frontend. -->
    <script>
        window.PRODIFY_BOARD_ID = {{ board.id }};
    </script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('js_static', filename='script.js') }}"></script>
</body>

</html>
